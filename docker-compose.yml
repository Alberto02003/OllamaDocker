services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 3G

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
    entrypoint: ["sh", "-c", "echo 'Pulling model ${OLLAMA_MODEL}...' && ollama pull ${OLLAMA_MODEL} && echo 'Model ready!'"]
    restart: "no"

  ollama-api:
    image: node:20-slim
    container_name: ollama_api
    depends_on:
      - ollama
    ports:
      - "5000:5000"
    volumes:
      - ./ollama-api:/app
    working_dir: /app
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: >
      sh -c "npm install --production && node index.js"

volumes:
  ollama_data:
